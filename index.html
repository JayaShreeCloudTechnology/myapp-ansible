<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Bank</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
        }

        header {
            background-color: #004080;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #003366;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            background-color: #004080;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            cursor: pointer;
        }

        button:hover {
            background-color: #0066cc;
        }

        .account {
            max-width: 500px;
            margin: auto;
        }
    </style>
</head>
<body>

<header>
    <h1>My Bank</h1>
    <p>Secure Online Banking</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Accounts</a>
    <a href="#">Transfer</a>
    <a href="#">Contact</a>
</nav>

<div class="container">

    <!-- Login Form -->
    <div class="card">
        <h2>Login</h2>
        <form>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>

    <!-- Account Summary -->
    <div class="card account">
        <h2>Account Summary</h2>
        <p><strong>Account Holder:</strong> John Doe</p>
        <p><strong>Account Number:</strong> 123456789</p>
        <p><strong>Balance:</strong> ₹50,000</p>
    </div>

</div>

</body>
</html>
